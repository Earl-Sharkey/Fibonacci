# .github/workflows/merge-on-cool.yml
name: Merge on cool comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >
      github.event.issue.pull_request &&
      (
        github.event.comment.body == ':cool:' ||
        github.event.comment.body == '🆒'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --repo "$REPO" --merge